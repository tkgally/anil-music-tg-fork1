name: Deploy to GitHub Pages

# Fable is a static, no-build site (React + Babel-standalone + CDN deps), so we
# just upload the repo as-is and publish it to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent publish; don't cancel an in-progress run mid-deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
